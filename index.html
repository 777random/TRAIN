<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0E0E10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TRAIN">
  <meta name="description" content="Funktionaler Workout-Tracker mit wöchentlichem Progressions-Tracking, Pausentimer und CSV-Export.">

  <title>TRAIN</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=6">

  <style>
    #app { opacity: 0; transition: opacity 200ms ease; }
    #app.is-ready { opacity: 1; }
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #0E0E10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: .2em;
      font-size: 36px;
      color: #C8FF00;
      transition: opacity 300ms ease;
    }
    #splash.is-hidden { opacity: 0; pointer-events: none; }
    #splash__ring {
      width: 32px; height: 32px;
      border: 3px solid #2E2E35;
      border-top-color: #C8FF00;
      border-radius: 50%;
      animation: spin 700ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="splash" aria-hidden="true">
    <div id="splash__ring"></div>
    TRAIN
  </div>

  <div id="app" aria-live="polite"></div>

  <script type="module">
    import { loadState, getState, dispatch, subscribe, A } from './state.js';
    import { exportJSON, importJSON, exportCSV }           from './backup.js';
    import { mountApp }                                    from './ui.js';
    import { mountTimer }                                  from './timer.js';
    import { registerServiceWorker, onStorageError, onSwUpdateReady } from './registerSW.js';

    const restored = loadState();
    if (!restored) {
      console.info('[TRAIN] No saved state – starting with default week.');
    }

    const appRoot = document.getElementById('app');
    mountApp(appRoot);

    mountTimer();

    appRoot.classList.add('is-ready');
    const splash = document.getElementById('splash');
    splash.classList.add('is-hidden');
    splash.addEventListener('transitionend', () => splash.remove(), { once: true });

    registerServiceWorker();

    window.__trainExportJSON = exportJSON;
    onStorageError(() => {
      document.getElementById('storage-warning')?.classList.add('is-visible');
    });

    onSwUpdateReady(event => {
      window.dispatchEvent(new CustomEvent('train:show-update-banner', {
        detail: { registration: event.detail.registration },
      }));
    });
  </script>

</body>
</html>
