  <!-- CSP nur als <meta>, da GitHub Pages keine echten HTTP-Header erlaubt
       (kein Server-Zugriff) — deckt daher nicht alle Header ab (z.B.
       X-Frame-Options funktioniert nur als echter HTTP-Header). Erlaubt
       Skript-Quellen nur von 'self' + GoatCounter, Bild-Fetch für Badge-
       Assets, keine Plugins/Objects, keine fremde base-Umleitung, keine
       Einbettung in fremde <iframe>s. 'unsafe-inline' bei script-src ist
       nötig, da die App ohne Build-Step direkt im Browser läuft und daher
       (a) den Bootstrap-<script> hier unten sowie (b) einige bestehende
       inline onclick-Handler in ui.js (Notiz-Toggle) nicht per Nonce/Hash
       absichern kann — kein CSP-Ersatz für h()-Escaping in ui.js (siehe
       dort), sondern zusätzliche Absicherung gegen externe Script-Injektion
       (z.B. <script src="https://evil.tld">-Payloads bleiben blockiert). -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://gc.zgo.at; img-src 'self' https://*.goatcounter.com data:; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.goatcounter.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'">

<body>

  <div id="splash" aria-hidden="true">

  <div id="app" aria-live="polite"></div>

  <script src="./dragdrop.js"></script>
  <script>
    // Touch-Drag-Reorder auf iOS/Android: dragdrop.js (mobile-drag-drop
    // 2.3.0-rc.1) polyfillt die native HTML5-Drag-Drop-API, die auf
    // Touch-Geräten sonst nicht zuverlässig feuert (siehe ui.js
    // _bindDrag(), das dragstart/dragover/drop nativ verwendet).
    //
    // Ersetzt den früheren separaten No-Op-touchmove-Listener hier oben
    // im <head> (zusammengeführt statt dupliziert) und blockt Scrollen
    // NUR während eines aktiven Drags, nicht global — eine
    // bedingungslose e.preventDefault() bei jedem touchmove würde jedes
    // Scrollen auf Touch-Geräten dauerhaft unterbinden, nicht nur
    // während des Drags. dragstart/dragend/drop bubblen sowohl nativ
    // als auch synthetisch vom Polyfill (dragdrop.js' w()-Helper:
    // bubbles:true), ein einzelner Listener auf window reicht daher für
    // beide Fälle.
    let _dragActive = false;
    window.addEventListener('dragstart', function() { _dragActive = true; });
    window.addEventListener('dragend',   function() { _dragActive = false; });
    window.addEventListener('drop',      function() { _dragActive = false; });

    window.addEventListener('touchmove', function(e) {
      if (_dragActive && e.cancelable) e.preventDefault();
    }, { passive: false });

    if ('ontouchstart' in window) {
      MobileDragDrop.polyfill({
        forceApply: false,
        holdToDrag: 400,
      });
    }
  </script>

  <script type="module">
    import { loadState, getState, dispatch, subscribe, A } from './state.js';
    import { exportJSON, importJSON, exportCSV }           from './backup.js';
    import { mountApp }                                    from './ui.js';
    import { mountTimer }                                  from './timer.js';
    import { registerServiceWorker, onStorageError, onSwUpdateReady } from './registerSW.js';

    // Install-Button im Onboarding (Chrome/Edge/Android): der Browser feuert
    // dieses Event nur EINMAL und nur wenn Manifest/SW/Icons die Kriterien
    // erfüllen. preventDefault() unterdrückt die eigene Mini-Infobar des
    // Browsers — wir zeigen stattdessen unseren eigenen Button im
    // Onboarding (ui.js _showOnboarding()) und rufen dp.prompt() darüber
    // auf. iOS Safari feuert dieses Event nie (keine solche API) — dort
    // zeigt ui.js stattdessen eine manuelle Anleitung.
    window.addEventListener('beforeinstallprompt', event => {
      event.preventDefault();
      window.__trainInstallPrompt = event;
    });
    window.addEventListener('appinstalled', () => {
      window.__trainInstallPrompt = null;
      window.dispatchEvent(new CustomEvent('train:app-installed'));
    });

    const restored = loadState();
    if (!restored) {
      console.info('[TRAIN] No saved state – onboarding will run.');
    }

    const appRoot = document.getElementById('app');
    mountApp(appRoot);

    mountTimer();

    appRoot.classList.add('is-ready');
    const splash = document.getElementById('splash');
    splash.classList.add('is-hidden');
    splash.addEventListener('transitionend', () => splash.remove(), { once: true });

    registerServiceWorker();

    window.__trainExportJSON = exportJSON;
    onStorageError(() => {
      document.getElementById('storage-warning')?.classList.add('is-visible');
    });

    // Globale Fehler-Sichtbarkeit (Pre-Launch-Checkliste): ohne diesen Handler
    // bleiben Crashes für Nutzer stumm und für uns unsichtbar. Meldet nur
    // Fehlermeldung/Dateiname an die Konsole (Debugging) und feuert das
    // anonyme GoatCounter-Event 'js_error' (siehe ui.js train:js-error-
    // Listener) — keine Nutzdaten verlassen das Gerät.
    // Seit train-v185 (B66): die Fehlermeldung selbst wird als GoatCounter-
    // Event-Pfad mitgegeben (gekürzt, keine Nutzdaten — reine JS-Fehlertext,
    // kein Trainingsdaten-Bezug) — vorher zeigte GoatCounter nur "es gab
    // einen Fehler", nie WELCHEN. Nutzer meldete einen reproduzierbaren
    // Fehler-Toast beim App-Öffnen auf allen Geräten, der sich trotz
    // mehrerer realistischer Nachstell-Versuche nicht lokal reproduzieren
    // ließ — das GoatCounter-Dashboard zeigt die konkrete Fehlermeldung
    // beim nächsten Auftreten, ohne dass der Nutzer die Browser-Konsole
    // öffnen muss.
    function _reportJsError(message) {
      const short = String(message ?? 'unknown').slice(0, 120);
      window.dispatchEvent(new CustomEvent('train:js-error', { detail: { message: short } }));
    }
    window.addEventListener('error', event => {
      const msg = event.error?.message ?? event.message;
      console.error('[TRAIN] Uncaught error:', event.error ?? event.message);
      _reportJsError(msg);
    });
    window.addEventListener('unhandledrejection', event => {
      const msg = event.reason?.message ?? event.reason;
      console.error('[TRAIN] Unhandled promise rejection:', event.reason);
      _reportJsError(msg);
    });

    onSwUpdateReady(event => {
      window.dispatchEvent(new CustomEvent('train:show-update-banner', {
        detail: { registration: event.detail.registration },
      }));
    });
  </script>

</body>
