name: TRAIN Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run regression tests
        run: npx playwright test tests/regression_core.spec.js --reporter=list

      - name: Run fixture import tests
        run: npx playwright test tests/fixtures.spec.js --reporter=list

      - name: Run security regression tests
        run: npx playwright test tests/security_xss.spec.js --reporter=list

      - name: Run delete-all-data regression test
        run: npx playwright test tests/delete_all_data.spec.js --reporter=list

      - name: Run streak-toggle regression test
        run: npx playwright test tests/streak_toggle.spec.js --reporter=list

      - name: Run PR-badge regression test
        run: npx playwright test tests/pr_badge.spec.js --reporter=list

      - name: Run smart weight-step migration test
        run: npx playwright test tests/smart_weightstep.spec.js --reporter=list

      - name: Run in-progress-week streak regression test
        run: npx playwright test tests/streak_inprogress_week.spec.js --reporter=list

      - name: Run share-image feature tests
        run: npx playwright test tests/share_image.spec.js --reporter=list

      - name: Run share-image sparkline redesign tests
        run: npx playwright test tests/share_image_sparkline.spec.js --reporter=list

  lighthouse:
    runs-on: ubuntu-latest
    needs: regression
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
